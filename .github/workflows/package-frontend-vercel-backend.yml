name: Package Hosted Vercel API

on:
  push:
    branches: [main]
    paths: [.github/package-frontend-vercel-backend.trigger]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Generate Node API at both possible Vercel roots
        run: python scripts/install_vercel_node_api.py

      - name: Validate generated API syntax
        run: |
          node --check 'api/[...path].js'
          node --check 'frontend/api/[...path].js'

      - name: Build frontend
        run: |
          npm --prefix frontend install --legacy-peer-deps --loglevel=error
          npm --prefix frontend run build

      - name: Commit generated hosted API
        run: |
          git config user.name "NEXGEN Vercel Bot"
          git config user.email "actions@users.noreply.github.com"
          git add 'api/[...path].js' 'frontend/api/[...path].js'
          git diff --cached --quiet && exit 0
          git commit -m "Run hosted office through Vercel Node API"
          git push origin HEAD:main
