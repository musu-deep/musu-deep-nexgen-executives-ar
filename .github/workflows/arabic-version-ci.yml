name: Arabic Edition CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install and build Arabic frontend
        run: |
          npm --prefix frontend install --legacy-peer-deps --loglevel=error
          npm --prefix frontend run build

  embedded-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt --quiet
      - name: Compile embedded backend and launchers
        run: python -m py_compile backend/server.py backend/arabic_server.py backend/embedded_server.py scripts/dev.py scripts/dev_embedded.py
      - name: Verify authentication and restart persistence
        env:
          DB_NAME: nexgen_executives_ar_ci
          JWT_SECRET: ci-validation-secret-with-more-than-32-characters
          EMBEDDED_DATA_FILE: /tmp/nexgen-executives-ci.json
        shell: bash
        run: |
          set +e
          rm -f "$EMBEDDED_DATA_FILE"

          python -m uvicorn backend.embedded_server:app --host 127.0.0.1 --port 8001 > backend-first.log 2>&1 &
          PID=$!
          python - <<'PY' > smoke-ci.log 2>&1
          import json, time, urllib.request
          base = "http://127.0.0.1:8001"

          def ready():
              last = None
              for _ in range(60):
                  try:
                      with urllib.request.urlopen(base + "/openapi.json", timeout=1) as response:
                          return json.loads(response.read().decode())
                  except Exception as exc:
                      last = exc
                      time.sleep(0.5)
              raise SystemExit(f"API did not start: {last!r}")

          def login():
              body = json.dumps({"email":"ceo@company.demo","password":"ExecAgent2026!"}).encode()
              request = urllib.request.Request(base + "/api/auth/login", data=body, headers={"Content-Type":"application/json"})
              with urllib.request.urlopen(request, timeout=10) as response:
                  return json.loads(response.read().decode())["access_token"]

          ready()
          token = login()
          request = urllib.request.Request(base + "/api/auth/me", headers={"Authorization":"Bearer " + token})
          with urllib.request.urlopen(request, timeout=10) as response:
              me = json.loads(response.read().decode())
          assert me["user"]["role"] == "ceo"

          project = {
              "name": "Persistent Embedded CI Project",
              "description": "Created before restart and verified after restart",
              "sector": "digital",
              "progress": 11,
              "status": "active",
              "budget": 1000,
              "priority": "high"
          }
          request = urllib.request.Request(
              base + "/api/projects",
              data=json.dumps(project).encode(),
              headers={"Content-Type":"application/json", "Authorization":"Bearer " + token},
          )
          with urllib.request.urlopen(request, timeout=10) as response:
              created = json.loads(response.read().decode())
          assert created["name"] == project["name"]
          print("First launch: login and project creation passed")
          PY
          FIRST_STATUS=$?
          kill $PID 2>/dev/null || true
          wait $PID 2>/dev/null || true
          if [ $FIRST_STATUS -ne 0 ]; then exit $FIRST_STATUS; fi

          python -m uvicorn backend.embedded_server:app --host 127.0.0.1 --port 8001 > backend-second.log 2>&1 &
          PID=$!
          python - <<'PY' >> smoke-ci.log 2>&1
          import json, time, urllib.request
          base = "http://127.0.0.1:8001"

          for _ in range(60):
              try:
                  with urllib.request.urlopen(base + "/openapi.json", timeout=1):
                      break
              except Exception:
                  time.sleep(0.5)
          else:
              raise SystemExit("API did not restart")

          body = json.dumps({"email":"ceo@company.demo","password":"ExecAgent2026!"}).encode()
          request = urllib.request.Request(base + "/api/auth/login", data=body, headers={"Content-Type":"application/json"})
          with urllib.request.urlopen(request, timeout=10) as response:
              token = json.loads(response.read().decode())["access_token"]

          request = urllib.request.Request(base + "/api/projects", headers={"Authorization":"Bearer " + token})
          with urllib.request.urlopen(request, timeout=10) as response:
              projects = json.loads(response.read().decode())
          assert any(project["name"] == "Persistent Embedded CI Project" for project in projects)
          print("Second launch: persisted project restored successfully")
          PY
          STATUS=$?
          kill $PID 2>/dev/null || true
          wait $PID 2>/dev/null || true
          exit $STATUS
      - name: Upload embedded diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: embedded-backend-diagnostics
          path: |
            backend-first.log
            backend-second.log
            smoke-ci.log
            /tmp/nexgen-executives-ci.json
          if-no-files-found: warn
