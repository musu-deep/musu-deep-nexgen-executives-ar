name: Vercel API Diagnostic

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect Vercel API routes
        run: |
          set -x
          curl --fail-with-body --show-error --location --max-time 30 \
            https://musu-deep-nexgen-executives-ar-4dip.vercel.app/api/health
          echo
          curl --fail-with-body --show-error --location --max-time 30 \
            https://musu-deep-nexgen-executives-ar-4dip.vercel.app/api/openapi.json \
            | python -c "import json,sys; data=json.load(sys.stdin); print(data['info']['title'])"
