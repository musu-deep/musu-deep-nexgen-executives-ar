name: Apply Embedded Runtime

on:
  push:
    branches: [main]
    paths: [.github/embedded-runtime.trigger]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - run: python scripts/enable_embedded_runtime.py
      - run: python -m pip install -r backend/requirements.txt --quiet
      - run: python -m py_compile backend/server.py backend/arabic_server.py scripts/dev.py
      - name: Smoke test embedded login
        env:
          USE_EMBEDDED_DB: "true"
          MONGO_URL: memory://local
          DB_NAME: nexgen_embedded_ci
          JWT_SECRET: embedded-runtime-validation-secret-32-chars
        run: |
          python -m uvicorn backend.arabic_server:app --host 127.0.0.1 --port 8001 > /tmp/backend.log 2>&1 &
          PID=$!
          trap 'kill $PID || true; cat /tmp/backend.log' EXIT
          python - <<'PY'
          import json, time, urllib.request
          base = 'http://127.0.0.1:8001'
          for _ in range(60):
              try:
                  with urllib.request.urlopen(base + '/api/', timeout=1) as r:
                      data = json.loads(r.read().decode())
                      assert data['database_mode'] == 'embedded-memory'
                      break
              except Exception:
                  time.sleep(.5)
          else:
              raise SystemExit('backend not ready')
          body = json.dumps({'email':'ceo@company.demo','password':'ExecAgent2026!'}).encode()
          req = urllib.request.Request(base + '/api/auth/login', data=body, headers={'Content-Type':'application/json'})
          with urllib.request.urlopen(req, timeout=5) as r:
              login = json.loads(r.read().decode())
          token = login['access_token']
          req = urllib.request.Request(base + '/api/auth/me', headers={'Authorization':'Bearer ' + token})
          with urllib.request.urlopen(req, timeout=5) as r:
              me = json.loads(r.read().decode())
          assert me['user']['role'] == 'ceo'
          print('embedded runtime smoke test passed')
          PY
      - run: npm --prefix frontend install --legacy-peer-deps --loglevel=error
      - run: npm --prefix frontend run build
      - name: Commit generated changes
        run: |
          git config user.name "NEXGEN Runtime Bot"
          git config user.email "actions@users.noreply.github.com"
          git add backend/server.py backend/requirements.txt backend/.env.example scripts/dev.py README.md
          git diff --cached --quiet && exit 0
          git commit -m "Run locally without MongoDB using embedded database"
          git push origin HEAD:main
