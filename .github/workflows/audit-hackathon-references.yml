name: Audit Hackathon References

on:
  push:
    branches:
      - main
    paths:
      - .github/hackathon-audit.trigger
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan repository
        shell: bash
        run: |
          set +e
          grep -RInE --exclude-dir=.git --exclude='audit-hackathon-references.yml' 'هاكاثون|[Hh][Aa][Cc][Kk][Aa][Tt][Hh][Oo][Nn]|contest-compliant|Contest-compliant|HACKATHON_' . > hackathon-audit.txt
          status=$?
          if [ $status -eq 1 ]; then
            echo 'No matching references found.' > hackathon-audit.txt
          fi
          cat hackathon-audit.txt

      - name: Upload audit
        uses: actions/upload-artifact@v4
        with:
          name: hackathon-reference-audit
          path: hackathon-audit.txt
          if-no-files-found: error
