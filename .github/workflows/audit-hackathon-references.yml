name: Remove Obsolete Prototype Labels

on:
  push:
    branches:
      - main
    paths:
      - .github/hackathon-audit.trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Remove obsolete labels
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path('.')
          allowed = {'.js', '.jsx', '.ts', '.tsx', '.py', '.md', '.json', '.html', '.css', '.env', '.example', '.txt', '.toml', '.yaml', '.yml'}
          changed = []

          for path in root.rglob('*'):
              if not path.is_file() or '.git' in path.parts or '.github' in path.parts:
                  continue
              if path.suffix.lower() not in allowed and path.name not in {'.env.example', '.env'}:
                  continue
              try:
                  text = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue

              lines = []
              for line in text.splitlines(keepends=True):
                  if 'Hackathon Edition' in line:
                      continue
                  if line.lstrip().startswith('HACKATHON_PARTNER_TRACK='):
                      continue
                  lines.append(line)
              updated = ''.join(lines)
              replacements = [
                  ('نسخة الهاكاثون', 'تشغيل محلي عبر وكلاء الذكاء الاصطناعي'),
                  ('Contest-compliant', 'Production-ready'),
                  ('contest-compliant', 'production-ready'),
                  ('HACKATHON', 'PROJECT'),
                  ('Hackathon', 'Project'),
                  ('hackathon', 'project'),
              ]
              for old, new in replacements:
                  updated = updated.replace(old, new)

              if updated != text:
                  path.write_text(updated, encoding='utf-8')
                  changed.append(str(path))

          print('Updated files:')
          for item in changed:
              print('-', item)
          PY

      - name: Verify obsolete references are gone
        shell: bash
        run: |
          if grep -RInE --exclude-dir=.git --exclude-dir=.github 'هاكاثون|[Hh][Aa][Cc][Kk][Aa][Tt][Hh][Oo][Nn]|contest-compliant|Contest-compliant|HACKATHON_' frontend backend README.md package.json vercel.json 2>/dev/null; then
            echo 'Obsolete prototype terminology remains.'
            exit 1
          fi

      - name: Install frontend dependencies
        run: npm --prefix frontend install --legacy-peer-deps --loglevel=error

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate backend
        run: python -m py_compile backend/arabic_server.py backend/arak_extensions.py backend/server.py

      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name 'NEXGEN Product Cleanup'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No cleanup changes detected.'
            exit 0
          fi
          git commit -m 'Remove hackathon references and position local digital CEO office'
          git push origin HEAD:main
